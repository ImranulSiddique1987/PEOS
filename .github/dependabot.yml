version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "chore"

  # pnpm / npm Workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      development-dependencies:
        dependency-type: "development"

      production-dependencies:
        dependency-type: "production"
