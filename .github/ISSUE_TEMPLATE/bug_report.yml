name: Bug Report
description: Report a reproducible bug or unexpected behavior in PEOS.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve PEOS.

        Please complete the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the problem clearly.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PEOS Version
      placeholder: e.g. 0.1.0

  - type: input
    id: node
    attributes:
      label: Node.js Version

  - type: input
    id: os
    attributes:
      label: Operating System

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
